<!DOCTYPE html><html lang="zh-CN" data-theme="dark"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>DS Agent v3.1</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
/* ══════════════════════════ DESIGN SYSTEM ══════════════════════════ */
:root{--bg:#0b0f15;--bg2:#111720;--card:#181f2a;--card2:#1e2735;--bdr:#262f3d;--bdr2:#334155;
  --gold:#f59e0b;--gold-bg:rgba(245,158,11,.1);--cyan:#10b981;--cyan-bg:rgba(16,185,129,.1);
  --red:#ef4444;--red-bg:rgba(239,68,68,.1);--blue:#3b82f6;--txt:#e2e8f0;--txt2:#94a3b8;--txt3:#64748b;
  --r:12px;--rs:8px;--f:'Inter',system-ui,sans-serif;--fm:'JetBrains Mono',monospace;--t:.2s ease}
[data-theme="light"]{--bg:#f8fafc;--bg2:#fff;--card:#f1f5f9;--card2:#e2e8f0;--bdr:#e2e8f0;--bdr2:#cbd5e1;
  --txt:#0f172a;--txt2:#475569;--txt3:#94a3b8}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:var(--f);background:var(--bg);color:var(--txt);font-size:14px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:4px}
body{display:flex}
a{color:var(--blue);text-decoration:none}

/* ══════════════════════════ LAYOUT ══════════════════════════ */
#app{display:flex;width:100%;height:100%}
/* Sidebar */
#sidebar{width:248px;min-width:248px;background:var(--bg2);border-right:1px solid var(--bdr);display:flex;flex-direction:column;z-index:20;transition:width var(--t),min-width var(--t)}
#sidebar.collapsed{width:56px;min-width:56px}
.side-logo{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--bdr);height:56px}
.side-logo .icon{width:28px;height:28px;background:var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#0f172a;flex-shrink:0}
.side-logo .text{font-weight:700;font-size:16px;white-space:nowrap}.side-logo .text span{color:var(--gold)}
#sidebar.collapsed .text,#sidebar.collapsed .nav-label,#sidebar.collapsed .nav-badge{display:none}
.side-nav{flex:1;overflow-y:auto;padding:12px 8px;display:flex;flex-direction:column;gap:2px}
.nav-section{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--txt3);padding:12px 10px 4px;font-weight:600}
#sidebar.collapsed .nav-section{display:none}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--rs);cursor:pointer;font-size:13px;color:var(--txt2);transition:var(--t);white-space:nowrap;position:relative;border:none;background:none;width:100%;text-align:left;font-family:var(--f)}
.nav-item:hover{background:var(--card);color:var(--txt)}
.nav-item.active{background:var(--gold-bg);color:var(--gold);font-weight:500}
.nav-item .nav-icon{width:20px;text-align:center;font-size:15px;flex-shrink:0}
.nav-badge{font-size:10px;padding:1px 6px;border-radius:10px;margin-left:auto;font-family:var(--fm);background:var(--red-bg);color:var(--red)}
.side-footer{padding:12px;border-top:1px solid var(--bdr);display:flex;flex-direction:column;gap:8px}
.collapse-btn{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--rs);cursor:pointer;font-size:12px;color:var(--txt3);border:none;background:none;font-family:var(--f);width:100%}
.collapse-btn:hover{background:var(--card);color:var(--txt2)}
/* Main */
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
/* Topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:var(--bg2);border-bottom:1px solid var(--bdr);flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:12px}
.page-title{font-size:18px;font-weight:600}
.page-subtitle{font-size:12px;color:var(--txt3)}
.topbar-right{display:flex;align-items:center;gap:8px}
.pill{display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;border:1px solid var(--bdr);background:var(--card);white-space:nowrap}
.pill .dot{width:6px;height:6px;border-radius:50%}.pill .dot.on{background:var(--cyan)}.pill .dot.mock{background:var(--gold)}
.btn{padding:7px 16px;border-radius:var(--rs);border:1px solid var(--bdr);background:var(--card);color:var(--txt2);cursor:pointer;font-size:12px;font-family:var(--f);transition:var(--t);white-space:nowrap}
.btn:hover{background:var(--card2);color:var(--txt);border-color:var(--bdr2)}
.btn.primary{background:var(--gold);color:#0f172a;border-color:var(--gold);font-weight:600}
.btn.primary:hover{opacity:.9}
.btn.danger{background:var(--red);color:#fff;border-color:var(--red)}
.btn.sm{padding:4px 10px;font-size:11px}
/* Content */
.content{flex:1;overflow-y:auto;padding:24px}
.page{display:none}.page.active{display:block}

/* ══════════════════════════ DASHBOARD ══════════════════════════ */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:20px;transition:var(--t)}
.kpi-card:hover{border-color:var(--bdr2)}
.kpi-card.crit{border-color:rgba(239,68,68,.5);box-shadow:0 0 24px rgba(239,68,68,.06)}
.kpi-card.warn{border-color:rgba(245,158,11,.4)}
.kpi-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.kpi-icon{font-size:24px}.kpi-title{font-size:13px;font-weight:600}.kpi-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-family:var(--fm)}
.kpi-badge.crit{background:var(--red-bg);color:var(--red)}.kpi-badge.warn{background:var(--gold-bg);color:var(--gold)}.kpi-badge.ok{background:var(--cyan-bg);color:var(--cyan)}
.kpi-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.kpi-stat{text-align:center;padding:6px;background:var(--bg);border-radius:var(--rs)}
.kpi-val{font-family:var(--fm);font-size:20px;font-weight:600}.kpi-val.crit{color:var(--red)}.kpi-val.warn{color:var(--gold)}.kpi-val.ok{color:var(--cyan)}
.kpi-lbl{font-size:10px;color:var(--txt3);margin-top:2px;text-transform:uppercase}
.kpi-detail{font-size:11px;color:var(--txt2);line-height:1.6;max-height:120px;overflow-y:auto}
.kpi-item{margin-bottom:4px;padding:5px 8px;background:var(--bg);border-radius:var(--rs)}
.kpi-item.crit{border-left:2px solid var(--red)}.kpi-item.warn{border-left:2px solid var(--gold)}
.kpi-item .head{font-weight:600;display:flex;justify-content:space-between;font-size:11px}
.kpi-item .sug{color:var(--cyan);font-size:10px;margin-top:2px}
.kpi-footer{font-size:10px;color:var(--txt3);margin-top:10px;padding-top:10px;border-top:1px solid var(--bdr)}

/* Panel row */
.panel-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
@media(max-width:1100px){.panel-row{grid-template-columns:1fr}}
.panel{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--bdr);font-size:13px;font-weight:600}
.panel-body{padding:12px 20px;max-height:280px;overflow-y:auto}
.alert-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr);font-size:12px}
.alert-row:last-child{border-bottom:none}
.alert-row.crit{border-left:3px solid var(--red);padding-left:12px}
.alert-row.warn{border-left:3px solid var(--gold);padding-left:12px}
.alert-msg{flex:1;line-height:1.5}.alert-actions{display:flex;gap:6px;flex-shrink:0}
.log-row{display:flex;gap:8px;padding:5px 0;font-size:11px;color:var(--txt2);align-items:center;border-bottom:1px solid var(--bdr)}
.log-row:last-child{border-bottom:none}.log-time{font-family:var(--fm);color:var(--txt3);font-size:10px;white-space:nowrap}

/* ══════════════════════════ SETTINGS ══════════════════════════ */
.settings-layout{display:flex;gap:0;height:100%}
.settings-sidebar{width:200px;min-width:200px;border-right:1px solid var(--bdr);overflow-y:auto;padding:8px}
.settings-content{flex:1;overflow-y:auto;padding:24px 32px}
.set-nav-item{display:block;width:100%;padding:8px 12px;border-radius:var(--rs);cursor:pointer;font-size:12px;color:var(--txt2);border:none;background:none;text-align:left;font-family:var(--f);transition:var(--t)}
.set-nav-item:hover{background:var(--card);color:var(--txt)}
.set-nav-item.active{background:var(--gold-bg);color:var(--gold);font-weight:500}
.set-title{font-size:20px;font-weight:600;margin-bottom:24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:11px;color:var(--txt3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--bdr);border-radius:var(--rs);color:var(--txt);font-size:13px;font-family:var(--f);outline:none;transition:var(--t)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,158,11,.08)}
.form-group textarea{resize:vertical;font-family:var(--fm);min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-check{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;cursor:pointer}
.form-check input[type=checkbox]{width:auto;accent-color:var(--gold)}
.form-actions{display:flex;gap:8px;margin-top:24px}
.form-hint{font-size:11px;color:var(--txt3);margin-top:4px}
/* List items */
.config-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.config-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg);border-radius:var(--rs);font-size:12px}
.config-item .name{font-weight:600}.config-item .meta{font-size:10px;color:var(--txt3)}

/* ══════════════════════════ LOGIN ══════════════════════════ */
.login-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-box{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:36px;width:360px;text-align:center}
.login-box h1{font-size:22px;margin-bottom:4px}.login-box h1 span{color:var(--gold)}
.login-box .sub{font-size:12px;color:var(--txt3);margin-bottom:24px}
.login-box input{width:100%;padding:10px 14px;margin-bottom:10px;background:var(--bg);border:1px solid var(--bdr);border-radius:var(--rs);color:var(--txt);font-size:14px;outline:none}
.login-box input:focus{border-color:var(--gold)}
.login-box .btn{width:100%;margin-top:4px}
.login-err{color:var(--red);font-size:11px;margin-top:8px}
/* Alert Detail Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .25s,visibility .25s}
.modal-overlay.show{opacity:1;visibility:visible}
.modal-box{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);width:640px;max-height:85vh;overflow-y:auto;padding:28px}
.modal-box h2{font-size:18px;margin-bottom:4px}.modal-box .modal-sub{font-size:11px;color:var(--txt3);margin-bottom:16px}
.modal-close{float:right;background:none;border:none;font-size:18px;cursor:pointer;color:var(--txt3)}
.modal-section{margin-bottom:20px}.modal-section h3{font-size:12px;font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;color:var(--txt2)}
.modal-table{width:100%;font-size:11px;border-collapse:collapse}.modal-table td{padding:6px 10px;border-bottom:1px solid var(--bdr)}.modal-table td:first-child{color:var(--txt3);width:100px}.modal-table td:last-child{font-family:var(--fm)}
.modal-ai{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rs);padding:14px;font-size:12px;line-height:1.7;color:var(--txt2)}
.modal-ai .label{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;margin-bottom:8px}.modal-ai .label.ai{background:var(--gold-bg);color:var(--gold)}
.modal-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.modal-actions .btn{padding:9px 20px;font-size:12px}
</style></head><body>

<div id="app">
<!-- Sidebar -->
<nav id="sidebar">
  <div class="side-logo"><div class="icon">DS</div><span class="text">DS<span>Agent</span></span></div>
  <div class="side-nav" id="side-nav"></div>
  <div class="side-footer">
    <div style="display:flex;align-items:center;gap:8px;font-size:11px;color:var(--txt3)">
      <span class="pill" style="border:none;padding:0"><span class="dot" id="api-dot"></span><span id="api-text">—</span></span>
    </div>
    <button class="collapse-btn" onclick="toggleSidebar()">◀ 收起菜单</button>
  </div>
</nav>

<!-- Main -->
<div id="main">
  <header class="topbar" id="topbar">
    <div class="topbar-left"><h1 class="page-title" id="page-title">监控中心</h1></div>
    <div class="topbar-right" id="topbar-actions"></div>
  </header>
  <div class="content" id="content"></div>
</div>
</div>

<!-- Alert Detail Modal -->
<div class="modal-overlay" id="alert-modal"><div class="modal-box" id="alert-modal-body"></div></div>

<!-- Login -->
<div class="login-overlay" id="login-overlay">
  <div class="login-box"><h1>DS<span>Agent</span></h1><div class="sub">AI 运营指挥中心 v3.1</div>
    <input id="login-user" placeholder="用户名" value="admin" onkeypress="if(event.key==='Enter')doLogin()">
    <input id="login-pass" type="password" placeholder="密码" value="admin123" onkeypress="if(event.key==='Enter')doLogin()">
    <button class="btn primary" onclick="doLogin()">登 录</button><div class="login-err" id="login-err"></div>
  </div>
</div>

<script>
/* ══════════════════════════ STATE ══════════════════════════ */
const API='http://127.0.0.1:8000';let token='',role='',user='',allAlerts=[],configData={},refreshTimer=null,loggedIn=false;
let currentPage='dashboard', currentSetting='llm';
function authHeaders(){return token?{Authorization:'Bearer '+token}:{}}

/* ══════════════════════════ THEME ══════════════════════════ */
(function(){const t=localStorage.getItem('dsagent-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.dataset.theme=t;})()
function toggleTheme(){const n=document.documentElement.dataset.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=n;localStorage.setItem('dsagent-theme',n);updateTopbar()}

/* ══════════════════════════ SIDEBAR ══════════════════════════ */
const NAV=[{section:'监控中心',items:[{id:'dashboard',icon:'📊',label:'运营总览'},{id:'products',icon:'🏷',label:'产品中心'}]},{section:'AI Agent',items:[{id:'inventory',icon:'📦',label:'库存预警'},{id:'advertising',icon:'📢',label:'广告分析'},{id:'profit',icon:'💰',label:'利润分析'},{id:'competitor',icon:'🔍',label:'跟卖监控'},{id:'listing',icon:'📋',label:'Listing优化'}]},{section:'工具',items:[{id:'checkall',icon:'▶',label:'一键巡检'},{id:'report',icon:'📊',label:'运营日报'}]},{section:'系统配置',items:[
  {id:'settings-llm',icon:'🤖',label:'LLM 模型'},{id:'settings-datasource',icon:'📡',label:'数据源'},{id:'settings-alerts',icon:'🔔',label:'告警阈值'},{id:'settings-notify',icon:'📢',label:'通知渠道'},{id:'settings-monitor',icon:'🎯',label:'监控对象'},{id:'settings-scheduler',icon:'⏱',label:'调度策略'},{id:'settings-storage',icon:'💾',label:'存储'},{id:'settings-ui',icon:'🎨',label:'界面'},{id:'settings-prompts',icon:'📝',label:'Prompt'},{id:'settings-rag',icon:'📚',label:'知识库'},{id:'settings-n8n',icon:'⚡',label:'n8n 工作流'},]}];

function buildSidebar(){
  let h='';
  for(const s of NAV){
    h+=`<div class="nav-section">${s.section}</div>`;
    for(const it of s.items) h+=`<button class="nav-item" data-page="${it.id}" onclick="navigate('${it.id}')"><span class="nav-icon">${it.icon}</span><span class="nav-label">${it.label}</span></button>`;
  }
  document.getElementById('side-nav').innerHTML=h;
}
function navigate(page){
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
  const btn=document.querySelector(`[data-page="${page}"]`);if(btn)btn.classList.add('active');
  updateTopbar();renderPage(page);
}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('collapsed')}

/* ══════════════════════════ TOPBAR ══════════════════════════ */
function updateTopbar(){
  const t=document.documentElement.dataset.theme;
  const activeItem=NAV.flatMap(s=>s.items).find(i=>i.id===currentPage);
  document.getElementById('page-title').textContent=activeItem?activeItem.label:'监控中心';
  document.getElementById('topbar-actions').innerHTML=`
    <button class="btn sm" onclick="toggleTheme()">${t==='dark'?'☀️':'🌙'}</button>
    <span class="pill"><span class="dot" id="api-dot"></span><span id="api-text">—</span></span>
    <button class="btn sm primary" onclick="navigate('checkall')">▶ 一键巡检</button>
    <button class="btn sm" onclick="doLogout()">退出</button>`;
  setTimeout(checkHealth,100);
}

/* ══════════════════════════ PAGE RENDER ══════════════════════════ */
function renderPage(page){
  const ct=document.getElementById('content');
  if(page==='dashboard')renderDashboard(ct);
  else if(page.startsWith('settings-')){currentSetting=page.replace('settings-','');renderSettings(ct);}
  else if(['inventory','advertising','profit','competitor','listing'].includes(page))renderAgentPage(ct,page);
  else if(page==='checkall'){navigate('dashboard');checkAll();}
  else if(page==='report')renderReportPage(ct);
  else if(page==='products')renderProductsPage(ct);
  else ct.innerHTML='<div style="padding:40px;text-align:center;color:var(--txt3)">开发中...</div>';
}

/* ══════════════════════════ DASHBOARD ══════════════════════════ */
const AGENTS=[{key:'inventory',icon:'📦',title:'库存预警'},{key:'advertising',icon:'📢',title:'广告分析'},{key:'profit',icon:'💰',title:'利润分析'},{key:'competitor',icon:'🔍',title:'跟卖监控'}];

function renderDashboard(ct){
  ct.innerHTML=`
    <div class="kpi-grid" id="kpi-grid">${AGENTS.map(a=>`<div class="kpi-card" id="card-${a.key}"><div class="kpi-header"><span><span class="kpi-icon">${a.icon}</span> <span class="kpi-title">${a.title}</span></span><span class="kpi-badge" id="badge-${a.key}">—</span></div><div class="kpi-metrics" id="stats-${a.key}"></div><div class="kpi-detail" id="detail-${a.key}"><div style="text-align:center;color:var(--txt3);padding:20px">加载中...</div></div><div class="kpi-footer" id="source-${a.key}"></div></div>`).join('')}</div>
    <div class="panel-row">
      <div class="panel"><div class="panel-header"><span>⚠️ 告警中心</span><span style="font-size:10px;color:var(--txt3)" id="alert-count">—</span><button class="btn sm" onclick="clearAlerts()">清空</button></div><div class="panel-body" id="alert-list"><div style="text-align:center;color:var(--txt3);padding:20px">等待巡检...</div></div></div>
      <div class="panel"><div class="panel-header"><span>📋 系统日志</span><button class="btn sm" onclick="loadSystemLogs()">刷新</button></div><div class="panel-body" id="log-list"><div style="text-align:center;color:var(--txt3);padding:20px">加载中...</div></div></div>
    </div>`;
  refreshAll();loadSystemLogs();
}

async function refreshAll(){
  for(const a of AGENTS){
    try{const r=await fetch(API+'/agents/run',{method:'POST',headers:{'Content-Type':'application/json',...authHeaders()},body:JSON.stringify({agent_name:a.key,params:{}})});renderKPI(a.key,(await r.json()).result||{},a);}catch(e){document.getElementById('detail-'+a.key).innerHTML=`<div style="color:var(--red);text-align:center;padding:8px">⚠️ ${e.message}</div>`;}
  }
}
function renderKPI(key,result,agent){
  const s=result.summary||{},status=result.status||'ok',alerts=result.alerts||result.anomalies||result.threats||[],suggestions=result.suggestions||[];
  const card=document.getElementById('card-'+key),badge=document.getElementById('badge-'+key);
  if(!card)return;
  const isCrit=status==='critical'||status==='threat'||status==='alert',isWarn=status==='warning'||status==='anomaly';
  card.className='kpi-card'+(isCrit?' crit':isWarn?' warn':'');
  badge.className='kpi-badge'+(isCrit?' crit':isWarn?' warn':' ok');
  badge.textContent=isCrit?'异常':isWarn?'关注':'正常';
  document.getElementById('stats-'+key).innerHTML=buildKPIMetrics(s,key);

}
function buildKPIMetrics(s,key){
  const m={inventory:[{k:'total_skus',l:'SKU'},{k:'healthy',l:'健康',c:'ok'},{k:'critical',l:'严重',c:'crit'}],advertising:[{k:'total_spend',l:'花费',fmt:v=>'$'+v},{k:'total_sales',l:'销售',fmt:v=>'$'+v},{k:'overall_acos',l:'ACOS',fmt:v=>v+'%'}],profit:[{k:'total_revenue',l:'营收',fmt:v=>'$'+v},{k:'total_profit',l:'毛利',fmt:v=>'$'+v},{k:'avg_margin',l:'毛利率',fmt:v=>v+'%'}],competitor:[{k:'total_asins',l:'ASIN'},{k:'buy_box_rate',l:'BuyBox',fmt:v=>v+'%'},{k:'critical',l:'威胁',c:'crit'}]}[key]||[];
  return m.map(f=>{const v=s[f.k]!==undefined?s[f.k]:'—';return`<div class="kpi-stat"><div class="kpi-val ${f.c||''}">${f.fmt?f.fmt(v):v}</div><div class="kpi-lbl">${f.l}</div></div>`}).join('');
}
function renderAlertPanel(){
  const active=allAlerts.filter(a=>!a.resolved);
  const list=document.getElementById('alert-list');if(!list)return;

  list.innerHTML=active.slice(0,10).map(a=>`<div class="alert-row ${a.level}"><span>${a.emoji||''}</span><div class="alert-msg"><b>[${({inventory:'库存',advertising:'广告',profit:'利润',competitor:'跟卖'}[a.type]||a.type)}]</b> ${a.title||''}</div><div class="alert-actions"><button class="btn sm primary" onclick="openAlertDetail('${a.id}')">查看</button></div></div>`).join('');
}

function openProductDetail(sku,asin,name,price,stock,sales7,sales30,bsr,acos,margin,rating,reviews,brand,category,status){
  const stockHealth=stock<=5?'严重缺货':stock<=15?'库存偏低':stock>200?'库存充足':'正常';
  const stockEmoji=stock<=5?'🔴':stock<=15?'🟡':'🟢';
  const marginHealth=margin<10?'利润率严重偏低':margin<15?'利润率偏低':'健康';
  const body=document.getElementById('alert-modal-body');
  body.innerHTML=`
    <button class="modal-close" onclick="closeAlertDetail()">✕</button>
    <h2>${name}</h2>
    <div class="modal-sub">${sku} | ${asin} | ${brand} | ${category}</div>
    <div class="modal-section"><h3>销售数据</h3>
      <table class="modal-table">
        <tr><td>售价</td><td>$${price}</td><td>状态</td><td>${status}</td></tr>
        <tr><td>日销(7天)</td><td>${sales7} 件</td><td>月销(30天)</td><td>${sales30} 件</td></tr>
        <tr><td>BSR</td><td>#${bsr}</td><td>评分</td><td>${rating} ⭐ (${reviews} 评)</td></tr>
      </table>
    </div>
    <div class="modal-section"><h3>库存与利润</h3>
      <table class="modal-table">
        <tr><td>库存</td><td>${stockEmoji} ${stock} 件 — ${stockHealth}</td><td>可售天数</td><td>${sales7>0?(stock/sales7).toFixed(1):'—'} 天</td></tr>
        <tr><td>ACOS</td><td>${acos}%</td><td>毛利率</td><td>${margin}% — ${marginHealth}</td></tr>
      </table>
    </div>
    <div class="modal-section"><h3>🤖 AI 建议</h3>
      <div class="modal-ai"><span class="label ai">AI</span><br>
        ${stock<=15?`<b>库存预警：</b>当前仅剩 ${stock} 件，按日均 ${sales7} 件计算，可售约 ${(stock/(sales7||1)).toFixed(1)} 天。建议立即评估补货需求。<br><br>`:''}
        ${margin<15?`<b>利润优化：</b>毛利率 ${margin}% 偏低，建议检查广告 ACOS (${acos}%) 和退款率，优化广告投放效率。<br><br>`:''}
        ${acos>25?`<b>广告异常：</b>ACOS ${acos}% 超出健康线，建议检查搜索词报告，暂停低转化关键词。<br><br>`:''}
        ${stock>200&&margin>20?`<b>表现优异：</b>该产品库存充足，利润健康。可考虑适当增加广告预算以获取更多流量。`:''}
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn primary" onclick="navigate('inventory');closeAlertDetail()">查看库存分析</button>
      <button class="btn" onclick="navigate('advertising');closeAlertDetail()">查看广告数据</button>
      <button class="btn" onclick="closeAlertDetail()">关闭</button>
    </div>`;
  document.getElementById('alert-modal').classList.add('show');
}

function buildSettingsPage(sec){
  if(!sec||!sec.fields){return buildCustomPage(currentSetting);}
  let cards='';
  // Group fields: first 3 → "基本设置", rest → "高级设置"
  const basic=sec.fields.slice(0,4),advanced=sec.fields.slice(4);
  cards+=buildSettingCard('基本设置',basic);
  if(advanced.length)cards+=buildSettingCard('高级设置',advanced);

  return `

function buildSettingCard(title,fields){
  if(!fields.length)return '';
  return `<div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:20px 24px;margin-bottom:16px">
    <h3 style="font-size:13px;font-weight:600;margin-bottom:16px;color:var(--txt)">${title}</h3>
    ${fields.map(f=>buildField(f)).join('')}
  </div>`;
}

function buildField(f){
  const fid='cfg-'+f.k.replace(/\./g,'-');
  let inner='';
  if(f.t==='select')inner=`<select id="${fid}">${(f.opts||'').split(',').map(o=>{const[v,l]=o.split(':');return`<option value="${v}">${l||v}</option>`}).join('')}</select>`;
  else if(f.t==='bool')inner=`<div class="form-check"><input type="checkbox" id="${fid}"><label>${f.l}</label></div>`;
  else if(f.t==='textarea')inner=`<textarea id="${fid}" rows="3"></textarea>`;
  else if(f.t==='password')inner=`<input type="password" id="${fid}" placeholder="${f.ph||'留空不修改'}">`;
  else inner=`<input type="${f.t||'text'}" id="${fid}"${f.ph?` placeholder="${f.ph}"`:''}>`;
  return `<div class="form-group">${f.t!=='bool'?`<label>${f.l}</label>`:''}${inner}${f.hint?`<div class="form-hint">${f.hint}</div>`:''}</div>`;
}

        <div class="form-actions"><button class="btn primary" onclick="saveDS()">保存数据源</button></div>
      </div>`;
    setTimeout(async()=>{try{configData=await(await fetch(API+'/config',{headers:authHeaders()})).json();document.getElementById('ds-list').innerHTML=(configData.datasources||[]).map(ds=>`<div class="config-item"><div><span class="name">${ds.name}</span><span style="font-size:10px;color:var(--txt3);margin-left:8px">${ds.type||''}</span></div><span style="font-size:10px;color:${ds.health==='connected'?'var(--cyan)':'var(--txt3)'}">${ds.health||'unknown'}</span></div>`).join('')||'暂无数据源';}catch(e){}},200);
  }else if(id==='prompts'){
    title='📝 Prompt 管理';desc='编辑 AI 分析提示词模板。修改后下次分析即时生效。';
    cards=`<div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:20px 24px">

      <div class="form-actions"><button class="btn primary" onclick="savePrompt()">💾 保存 Prompt</button></div></div>`;
  }else if(id==='rag'){
    title='📚 知识库';desc='上传公司 SOP、操作手册等文档。Agent 在分析时自动检索相关知识。';
    cards=`<div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:20px 24px;margin-bottom:16px">
      <h3 style="font-size:13px;font-weight:600;margin-bottom:16px">上传文档</h3>
      <div class="form-group"><label>标题</label><input id="rag-title" placeholder="例如：补货标准操作流程"></div>
      <div class="form-group"><label>内容</label><textarea id="rag-content" rows="8" placeholder="将 SOP 文档内容粘贴到这里..."></textarea></div>
      <div class="form-actions"><button class="btn primary" onclick="uploadRAG()">上传到知识库</button></div></div>
      <div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:20px 24px"><h3 style="font-size:13px;font-weight:600;margin-bottom:16px">已有文档</h3><div class="config-list" id="rag-list"></div></div>`;
  }else if(id==='n8n'){
    title='⚡ n8n 工作流引擎';desc='管理 n8n 工作流集成。触发工作流后 n8n 执行编排逻辑，回调 Agent API。';
    cards=`
      <div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:20px 24px;margin-bottom:16px">
        <h3 style="font-size:13px;font-weight:600;margin-bottom:16px">连接状态</h3>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><span class="pill"><span class="dot" id="n8n-dot" style="background:var(--txt3)"></span></span><span id="n8n-status-text">检测中...</span><button class="btn sm" onclick="checkN8NHealth()">⟳ 刷新</button></div>
        <div class="form-hint">n8n 默认地址: http://localhost:5678。启动命令: docker-compose --profile full up -d n8n</div>
      </div>
      <div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:20px 24px;margin-bottom:16px">
        <h3 style="font-size:13px;font-weight:600;margin-bottom:16px">工作流管理</h3>
        <div style="display:flex;gap:8px;margin-bottom:12px"><button class="btn primary" onclick="loadN8NWorkflows()">加载工作流</button><button class="btn" onclick="importN8NShopify()">导入 Shopify 工作流</button></div>
        <div class="config-list" id="n8n-wf-list" style="max-height:200px;overflow-y:auto"></div>
      </div>
      <div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:20px 24px;margin-bottom:16px">
        <h3 style="font-size:13px;font-weight:600;margin-bottom:16px">手动触发</h3>
        <div class="form-group"><label>Webhook 路径</label><input id="n8n-webhook-path" placeholder="例如 restock-alert"><div class="form-hint">对应 n8n Webhook 节点的路径</div></div>
        <div class="form-group"><label>数据 (JSON)</label><textarea id="n8n-data" rows="3" placeholder='{"sku":"CHG001","qty":500}'></textarea></div>
        <div class="form-actions"><button class="btn primary" onclick="triggerN8N()">▶ 触发执行</button><button class="btn" onclick="triggerN8NAlert()">🔔 模拟告警</button></div>
      </div>
      <div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:20px 24px"><h3 style="font-size:13px;font-weight:600;margin-bottom:16px">执行历史</h3><button class="btn sm" style="margin-bottom:8px" onclick="loadN8NExecs()">刷新</button><div class="config-list" id="n8n-exec-list"></div></div>`;
  }
  return `
    <div style="position:sticky;top:0;background:var(--bg);z-index:5;display:flex;align-items:center;justify-content:space-between;padding-bottom:16px;margin-bottom:24px;border-bottom:1px solid var(--bdr)">
      <div><h2 class="set-title">${title}</h2><p style="font-size:12px;color:var(--txt3);margin-top:4px">${desc}</p></div>
    </div>
    <div id="save-toast" style="display:none;position:fixed;top:20px;right:20px;background:var(--cyan);color:#fff;padding:12px 20px;border-radius:var(--rs);font-size:13px;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.3)"></div>
    ${cards}`;
}

/* ══════════════════════════ SETTINGS LOGIC ══════════════════════════ */
async function loadConfigIntoForm(){
  try{configData=await(await fetch(API+'/config',{headers:authHeaders()})).json();}catch(e){return;}
  const sec=SET_SECTIONS.find(s=>s.id===currentSetting);
  if(!sec||!sec.fields)return;
  for(const f of sec.fields){
    const el=document.getElementById('cfg-'+f.k.replace(/\./g,'-'));
    if(!el)continue;
    let val='';const keys=f.k.split('.');let obj=(configData[sec.section||currentSetting]||configData);
    for(const k of keys)obj=obj?obj[k]:undefined;val=obj!==undefined?obj:'';
    if(Array.isArray(val))val=val.join('\n');
    if(f.t==='bool')el.checked=val===true||val==='true';
    else if(f.t!=='password')el.value=val;
  }
}
function getFormData(){
  const sec=SET_SECTIONS.find(s=>s.id===currentSetting);if(!sec||!sec.fields)return{};
  const data={};
  for(const f of sec.fields){
    const el=document.getElementById('cfg-'+f.k.replace(/\./g,'-'));
    if(!el)continue;
    let val;if(f.t==='bool')val=el.checked;else if(f.t==='textarea'){const v=el.value.trim();val=f.k.includes('asin')||f.k.includes('sku')||f.k.includes('keyword')||f.k.includes('agent')?v.split('\n').map(s=>s.trim()).filter(Boolean):v;}else if(f.t==='number')val=parseFloat(el.value)||0;else val=el.value;
    const keys=f.k.split('.');if(keys.length===1)data[keys[0]]=val;else{let obj=data;for(let i=0;i<keys.length-1;i++){if(!obj[keys[i]])obj[keys[i]]={};obj=obj[keys[i]];}obj[keys[keys.length-1]]=val;}
  }return data;
}
function showToast(msg,isErr){const t=document.getElementById('save-toast');if(!t)return;t.style.display='block';t.style.background=isErr?'var(--red)':'var(--cyan)';t.textContent=msg;setTimeout(()=>{t.style.display='none'},2500);}
async function saveSettings(){
  const section=SET_SECTIONS.find(s=>s.id===currentSetting)?.section||currentSetting;
  try{await fetch(API+'/config/update',{method:'POST',headers:{'Content-Type':'application/json',...authHeaders()},body:JSON.stringify({section,data:getFormData()})});showToast('✅ 设置已保存，已即时生效');}catch(e){showToast('❌ 保存失败: '+e.message,true);}
}
async function saveDS(){
  const n=document.getElementById('cfg-ds-name').value,u=document.getElementById('cfg-ds-url').value,k=document.getElementById('cfg-ds-key').value;
  try{await fetch(API+'/config/update',{method:'POST',headers:{'Content-Type':'application/json',...authHeaders()},body:JSON.stringify({section:'datasource',data:{name:n,url:u,secret_key:k,enabled:true}})});showToast('✅ 数据源已保存');renderSettings(document.getElementById('content'));}catch(e){showToast('❌ '+e.message,true);}
}
async function reloadCfg(){try{await fetch(API+'/config/reload',{method:'POST',headers:authHeaders()});location.reload();}catch(e){}}
async function loadPrompts(){const sel=document.getElementById('prompt-select');if(!sel)return;sel.innerHTML='';try{const r=await fetch(API+'/prompts');const d=await r.json();const prompts=d.prompts||{};for(const[cat,items]of Object.entries(prompts)){if(typeof items==='object')for(const[name]of Object.entries(items)){const opt=document.createElement('option');opt.value=cat+'/'+name;opt.textContent=cat+'/'+name;sel.appendChild(opt);}}if(sel.options.length)loadPrompt();}catch(e){}}
async function loadPrompt(){const sel=document.getElementById('prompt-select');if(!sel||!sel.value)return;const[cat,name]=sel.value.split('/');try{const r=await fetch(API+'/prompts');const d=await r.json();const content=((d.prompts||{})[cat]||{})[name]||'';document.getElementById('prompt-content').value=content;}catch(e){}}
async function savePrompt(){const sel=document.getElementById('prompt-select');if(!sel||!sel.value)return;const[category,name]=sel.value.split('/');const content=document.getElementById('prompt-content').value;try{await fetch(API+'/prompts/update',{method:'POST',headers:{'Content-Type':'application/json',...authHeaders()},body:JSON.stringify({category,name,content})});alert('已保存');}catch(e){}}
async function uploadRAG(){const t=document.getElementById('rag-title').value.trim(),c=document.getElementById('rag-content').value.trim();if(!t||!c)return;try{await fetch(API+'/rag/upload',{method:'POST',headers:{'Content-Type':'application/json',...authHeaders()},body:JSON.stringify({title:t,content:c})});document.getElementById('rag-title').value='';document.getElementById('rag-content').value='';loadRAGList();}catch(e){alert(e.message);}}
async function loadRAGList(){const list=document.getElementById('rag-list');if(!list)return;try{const r=await fetch(API+'/rag/documents',{headers:authHeaders()});const d=await r.json();const docs=d.documents||[];list.innerHTML=docs.map(d=>`<div class="config-item"><span class="name">${d.title}</span><button class="btn sm" onclick="deleteRAG('${d.doc_id}')">✕</button></div>`).join('')||'暂无文档';}catch(e){}}
async function deleteRAG(id){try{await fetch(API+'/rag/documents/'+id,{method:'DELETE',headers:authHeaders()});loadRAGList();}catch(e){}}

/* ══════════════════════════ n8n FUNCTIONS ══════════════════════════ */
async function checkN8NHealth(){try{const r=await fetch(API+'/n8n/health');const d=await r.json();const dot=document.getElementById('n8n-dot'),txt=document.getElementById('n8n-status-text');if(dot){dot.style.background=d.status==='connected'?'var(--cyan)':'var(--red)';if(txt)txt.textContent=d.status==='connected'?'已连接 — n8n 在线':d.status+' — 启动 n8n 后可用';}}catch(e){}}
async function loadN8NWorkflows(){const list=document.getElementById('n8n-wf-list');if(!list)return;try{const r=await fetch(API+'/n8n/workflows');const d=await r.json();const wfs=d.workflows||[];list.innerHTML=wfs.length?wfs.map(w=>`<div class="config-item"><span class="name">${w.name||w.id} ${w.active?'🟢':''}</span><button class="btn sm" onclick="triggerN8NById('${w.id}')">▶</button></div>`).join(''):'<div style="color:var(--txt3);text-align:center">暂无工作流</div>';}catch(e){}}
async function triggerN8N(){const p=document.getElementById('n8n-webhook-path').value.trim();if(!p)return;let data={};try{data=JSON.parse(document.getElementById('n8n-data').value||'{}');}catch(e){}try{const r=await fetch(API+'/n8n/trigger',{method:'POST',headers:{'Content-Type':'application/json',...authHeaders()},body:JSON.stringify({webhook_path:p,data})});const d=await r.json();alert(d.success?'✅ 已触发 ('+d.duration_ms+'ms)':'❌ '+d.error);}catch(e){alert(e.message);}}
function triggerN8NById(id){const p=prompt('Webhook 路径?','');if(!p)return;document.getElementById('n8n-webhook-path').value=p;triggerN8N();}
async function triggerN8NAlert(){const t=prompt('告警类型:\ninventory_low | acos_spike | buy_box_lost | new_hijacker | profit_drop','inventory_low');if(!t)return;try{const r=await fetch(API+'/n8n/alert?alert_type='+t,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sku:'CHG001',asin:'B08ABC1234',qty:5})});const d=await r.json();alert(d.success?'✅ 已触发':'❌ '+d.error);}catch(e){}}
async function loadN8NExecs(){const list=document.getElementById('n8n-exec-list');if(!list)return;try{const r=await fetch(API+'/n8n/executions');const d=await r.json();const ex=d.executions||[];list.innerHTML=ex.length?ex.map(e=>`<div class="config-item"><span>${e.workflow_name||e.id}</span><span style="font-size:10px;color:${e.status==='success'?'var(--cyan)':'var(--red)'}">${e.status}</span></div>`).join(''):'<div style="color:var(--txt3);text-align:center">暂无记录</div>';}catch(e){}}
async function importN8NShopify(){const p=prompt('工作流 JSON 目录:','C:/Users/NIERGAM/Desktop/n8n-workflows-main/workflows/Shopify');if(!p)return;try{const r=await fetch(API+'/n8n/import',{method:'POST',headers:{'Content-Type':'application/json',...authHeaders()},body:JSON.stringify({path:p,pattern:'*.json'})});const d=await r.json();alert(`导入: ${d.imported||0} | 跳过: ${d.skipped||0} | 失败: ${d.failed||0}`);loadN8NWorkflows();}catch(e){alert(e.message);}}

/* ══════════════════════════ AUTH ══════════════════════════ */
async function checkHealth(){try{const r=await fetch(API+'/health');const d=await r.json();const dot=document.getElementById('api-dot'),txt=document.getElementById('api-text');if(dot){dot.className='dot '+(d.mock_mode?'mock':'on');if(txt)txt.textContent=d.mock_mode?'Mock':'在线';}}catch(e){}}
async function doLogin(){
  const u=document.getElementById('login-user').value,p=document.getElementById('login-pass').value;
  try{const r=await fetch(API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});const d=await r.json();
    if(d.access_token){token=d.access_token;role=d.role;user=d.username;document.getElementById('login-overlay').style.display='none';buildSidebar();navigate('dashboard');if(!loggedIn){loggedIn=true;setInterval(refreshAll,5*60*1000);}}
    else document.getElementById('login-err').textContent=d.detail||'登录失败';
  }catch(e){document.getElementById('login-err').textContent='连接失败: '+e.message}
}
function doLogout(){token='';role='';location.reload();}
